# Local dev stack — bring up the MCP server + orchestration backend to test
# before deploying to syndrax.app. Keys come from your local .env (gitignored).
#
#   docker compose up
#
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: syndrax-backend
    env_file: .env
    environment:
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  mcp:
    build: .
    container_name: syndrax-mcp
    env_file: .env
    environment:
      SYNDRAX_ENV: dev
      TRANSPORT: sse
      SYNDRAX_API_ENDPOINT: http://backend:8000   # resolved on the compose network
      LOG_LEVEL: DEBUG
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  # OPTIONAL: self-hosted LiteLLM proxy (the model call layer).
  # Uncomment to run it alongside. Config in litellm-config.yaml.
