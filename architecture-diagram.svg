<svg viewBox="0 0 1600 1180" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Helvetica Neue',Arial,sans-serif">
<defs>
  <radialGradient id="depth" cx="78%" cy="-6%" r="120%">
    <stop offset="0%" stop-color="#101a2e"/>
    <stop offset="58%" stop-color="#07090F"/>
  </radialGradient>
  <linearGradient id="ovr" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#22D3EE"/><stop offset="100%" stop-color="#60A5FA"/>
  </linearGradient>
  <linearGradient id="execgrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#34D399"/><stop offset="50%" stop-color="#60A5FA"/><stop offset="100%" stop-color="#FB7185"/>
  </linearGradient>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6.5" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#cdd6e6"/>
  </marker>
  <marker id="arrd" markerWidth="9" markerHeight="9" refX="6.5" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#7d8aa0"/>
  </marker>
  <pattern id="hex" width="56" height="48.5" patternUnits="userSpaceOnUse" patternTransform="scale(1)">
    <path d="M14,0 L42,0 L56,24.25 L42,48.5 L14,48.5 L0,24.25 Z" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  </pattern>
  <style>
    .panel{fill:#ffffff;fill-opacity:.04;stroke:#ffffff;stroke-opacity:.12;stroke-width:1.2}
    .t{fill:#F5F8FF}.dim{fill:#9AA6BC}.mute{fill:#5B6679}
    .h{font-weight:bold}
    .lbl{font-size:13px}.sm{font-size:11.5px}.tiny{font-size:10.5px}
    .arrow{stroke:#cdd6e6;stroke-width:2;fill:none}
    .dash{stroke:#7d8aa0;stroke-width:1.8;fill:none;stroke-dasharray:5 5}
  </style>
</defs>

<rect width="1600" height="1180" fill="url(#depth)"/>
<rect width="1600" height="1180" fill="url(#hex)"/>

<!-- ===== TITLE ===== -->
<text x="48" y="66" class="t h" font-size="40">⚡ HERMES</text>
<text x="300" y="66" class="dim" font-size="22">Multi-Model Orchestration Layer</text>
<rect x="48" y="86" width="900" height="34" rx="17" class="panel"/>
<text x="68" y="108" class="dim sm">objective:</text>
<text x="148" y="108" class="t sm h">minimize cost</text>
<text x="262" y="108" class="dim sm">subject to quality thresholds  ·  metric:</text>
<text x="566" y="108" class="t sm h">quality_per_dollar</text>

<!-- column headers -->
<text x="48"   y="172" class="mute sm h" letter-spacing="3">CALL LAYER &amp; KEYS</text>
<text x="690"  y="172" class="mute sm h" letter-spacing="3">REQUEST HOT PATH</text>
<text x="1086" y="172" class="mute sm h" letter-spacing="3">SELF-IMPROVEMENT</text>

<!-- ============================================================ -->
<!-- LEFT COLUMN — CALL LAYER & KEYS -->
<!-- ============================================================ -->
<rect x="40" y="190" width="520" height="92" rx="14" class="panel"/>
<text x="62" y="222" class="t lbl h">LiteLLM Proxy · on VPS</text>
<text x="62" y="246" class="dim sm">One endpoint, many providers — a dumb pipe.</text>
<text x="62" y="266" class="dim sm">Its own routing/fallback is OFF; the Gates decide.</text>

<!-- direct keys -->
<g>
  <rect x="40" y="300" width="520" height="34" rx="8" class="panel"/>
  <circle cx="64" cy="317" r="5" fill="#A78BFA"/><text x="82" y="321" class="t sm h">ANTHROPIC_API_KEY</text><text x="560" y="321" text-anchor="end" class="dim sm">Claude Opus / Sonnet / Haiku  </text>
  <rect x="40" y="340" width="520" height="34" rx="8" class="panel"/>
  <circle cx="64" cy="357" r="5" fill="#34D399"/><text x="82" y="361" class="t sm h">DEEPSEEK_API_KEY</text><text x="560" y="361" text-anchor="end" class="dim sm">DeepSeek V3 / V4 Flash / Pro  </text>
  <rect x="40" y="380" width="520" height="34" rx="8" class="panel"/>
  <circle cx="64" cy="397" r="5" fill="#22D3EE"/><text x="82" y="401" class="t sm h">ZAI_API_KEY</text><text x="560" y="401" text-anchor="end" class="dim sm">GLM-5.2  (planner)  </text>
  <rect x="40" y="420" width="520" height="34" rx="8" class="panel"/>
  <circle cx="64" cy="437" r="5" fill="#FB7185"/><text x="82" y="441" class="t sm h">OPENAI_API_KEY</text><text x="560" y="441" text-anchor="end" class="dim sm">GPT-5.4  </text>
  <rect x="40" y="460" width="520" height="34" rx="8" class="panel"/>
  <circle cx="64" cy="477" r="5" fill="#60A5FA"/><text x="82" y="481" class="t sm h">GOOGLE_API_KEY</text><text x="560" y="481" text-anchor="end" class="dim sm">Gemini 3 Flash / Flash-Lite  </text>
</g>

<!-- openrouter failover -->
<rect x="40" y="508" width="520" height="64" rx="12" fill="#F0A35B" fill-opacity="0.08" stroke="#F0A35B" stroke-opacity="0.5" stroke-width="1.2"/>
<text x="62" y="535" class="t lbl h">OPENROUTER_API_KEY</text>
<text x="380" y="535" class="dim sm">failover + testing</text>
<text x="62" y="557" class="dim sm">Any miss or failure falls through here (catch-all).</text>

<text x="40" y="600" class="mute tiny">model → provider → key env → read at runtime ( .env / AWS Secrets )</text>
<text x="40" y="618" class="mute tiny">5 direct keys + 1 OpenRouter key cover the whole system · keys never in repo</text>

<!-- connector: hot path -> call layer -->
<path d="M 600 510 C 584 470, 580 340, 575 284" class="arrow" marker-end="url(#arr)"/>
<text x="592" y="408" class="mute tiny" transform="rotate(90 592 408)">every model call</text>

<!-- ============================================================ -->
<!-- CENTER COLUMN — HOT PATH -->
<!-- ============================================================ -->
<!-- TASK -->
<rect x="690" y="190" width="220" height="42" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.18"/>
<text x="800" y="217" text-anchor="middle" class="t lbl h">YOU · task in</text>
<path d="M800 232 L800 260" class="arrow" marker-end="url(#arr)"/>

<!-- PLANNER -->
<rect x="600" y="262" width="400" height="150" rx="16" fill="#22D3EE" fill-opacity="0.07" stroke="#22D3EE" stroke-opacity="0.55" stroke-width="1.4"/>
<circle cx="624" cy="290" r="6" fill="#22D3EE"/>
<text x="642" y="295" class="t lbl h">TIER 1 · PLANNER</text>
<text x="984" y="295" text-anchor="end" class="dim sm">GLM-5.2</text>
<rect x="620" y="312" width="360" height="38" rx="9" class="panel"/>
<text x="636" y="330" class="t sm h">Gate A</text><text x="700" y="335" class="dim sm">enough context? → ask YOU, loop</text>
<rect x="620" y="358" width="360" height="40" rx="9" class="panel"/>
<text x="636" y="376" class="t sm h">Gate B</text><text x="700" y="382" class="dim sm">score complexity 0–10 → emit plan</text>
<path d="M800 412 L800 448" class="arrow" marker-end="url(#arr)"/>

<!-- EXECUTORS -->
<rect x="600" y="450" width="400" height="172" rx="16" fill="url(#execgrad)" fill-opacity="0.10" stroke="#60A5FA" stroke-opacity="0.5" stroke-width="1.4"/>
<text x="620" y="478" class="t lbl h">TIER 2 · EXECUTORS</text>
<text x="980" y="478" text-anchor="end" class="dim sm">routed by complexity</text>
<!-- three lanes -->
<rect x="618" y="492" width="116" height="112" rx="11" fill="#34D399" fill-opacity="0.10" stroke="#34D399" stroke-opacity="0.5"/>
<text x="676" y="514" text-anchor="middle" class="t sm h">SIMPLE</text>
<text x="676" y="532" text-anchor="middle" class="mute tiny">0–3</text>
<text x="676" y="556" text-anchor="middle" class="dim tiny">DeepSeek V3</text>
<text x="676" y="574" text-anchor="middle" class="dim tiny">Gemini Flash</text>
<rect x="742" y="492" width="116" height="112" rx="11" fill="#60A5FA" fill-opacity="0.10" stroke="#60A5FA" stroke-opacity="0.5"/>
<text x="800" y="514" text-anchor="middle" class="t sm h">MEDIUM</text>
<text x="800" y="532" text-anchor="middle" class="mute tiny">4–6</text>
<text x="800" y="556" text-anchor="middle" class="dim tiny">Sonnet 4.6</text>
<text x="800" y="574" text-anchor="middle" class="dim tiny">GLM-5.2</text>
<rect x="866" y="492" width="116" height="112" rx="11" fill="#FB7185" fill-opacity="0.10" stroke="#FB7185" stroke-opacity="0.5"/>
<text x="924" y="514" text-anchor="middle" class="t sm h">HARD</text>
<text x="924" y="532" text-anchor="middle" class="mute tiny">7–10 · collab</text>
<text x="924" y="556" text-anchor="middle" class="dim tiny">Opus 4.8</text>
<text x="924" y="574" text-anchor="middle" class="dim tiny">GPT-5.4</text>
<path d="M800 622 L800 658" class="arrow" marker-end="url(#arr)"/>

<!-- MICRO-ORCH -->
<rect x="600" y="660" width="400" height="92" rx="16" fill="#F5B544" fill-opacity="0.08" stroke="#F5B544" stroke-opacity="0.55" stroke-width="1.4"/>
<circle cx="624" cy="688" r="6" fill="#F5B544"/>
<text x="642" y="693" class="t lbl h">TIER 2.5 · MICRO-ORCHESTRATOR</text>
<text x="620" y="720" class="dim sm">Gates C / D / F → 1 local fix  OR  1 callback to Planner</text>
<text x="620" y="740" class="mute tiny">Gate E retry budget · Gate G collab only when stuck · no ping-pong</text>
<path d="M800 752 L800 788" class="arrow" marker-end="url(#arr)"/>

<!-- callback arrow micro -> planner -->
<path d="M1000 700 C 1034 660, 1034 380, 1000 340" class="dash" marker-end="url(#arrd)"/>
<text x="1012" y="524" class="mute tiny" transform="rotate(90 1012 524)">re-plan ↺</text>

<!-- VERIFIER -->
<rect x="600" y="790" width="400" height="92" rx="16" fill="#A78BFA" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.55" stroke-width="1.4"/>
<circle cx="624" cy="818" r="6" fill="#A78BFA"/>
<text x="642" y="823" class="t lbl h">TIER 3 · VERIFIER</text>
<text x="984" y="823" text-anchor="end" class="dim sm">DeepSeek / Sonnet</text>
<text x="620" y="850" class="dim sm">lint · type · second opinion</text>
<text x="620" y="870" class="t tiny h">Gate H</text><text x="676" y="870" class="dim tiny">· pause for human if high-stakes</text>
<path d="M800 882 L800 916" class="arrow" marker-end="url(#arr)"/>

<!-- OUTPUT -->
<rect x="690" y="918" width="220" height="42" rx="12" fill="#34D399" fill-opacity="0.12" stroke="#34D399" stroke-opacity="0.6"/>
<text x="800" y="945" text-anchor="middle" class="t lbl h">commit / output</text>

<!-- ============================================================ -->
<!-- RIGHT COLUMN — SELF-IMPROVEMENT -->
<!-- ============================================================ -->
<rect x="1040" y="190" width="520" height="84" rx="14" class="panel"/>
<text x="1062" y="220" class="t lbl h">Benchmark Log</text>
<text x="1062" y="244" class="dim sm">one record / task: cost, quality, complexity</text>
<text x="1062" y="264" class="dim sm">predicted-vs-actual, escalations, feedback</text>
<path d="M1300 290 L1300 326" class="arrow" marker-end="url(#arr)"/>

<rect x="1040" y="328" width="520" height="96" rx="14" fill="#E7ECF5" fill-opacity="0.06" stroke="#E7ECF5" stroke-opacity="0.35" stroke-width="1.3"/>
<text x="1062" y="358" class="t lbl h">TIER 0 · ARCHITECT</text>
<text x="1538" y="358" text-anchor="end" class="dim sm">Opus 4.8 · not in hot path</text>
<text x="1062" y="382" class="dim sm">reads logs → rewrites routing rules</text>
<text x="1062" y="402" class="mute tiny">one change at a time · sandbox-tested on held-out · hard quality floor</text>

<!-- architect -> pipeline dashed -->
<path d="M1040 388 C 1014 430, 1014 470, 1002 500" class="dash" marker-end="url(#arrd)"/>
<text x="1006" y="452" class="mute tiny" transform="rotate(90 1006 452)">tunes routing</text>

<rect x="1040" y="440" width="520" height="84" rx="14" class="panel"/>
<text x="1062" y="470" class="t lbl h">Self-Teaching Planner</text>
<text x="1430" y="470" text-anchor="end" class="mute sm">future</text>
<text x="1062" y="494" class="dim sm">feedback clusters → grow / prune</text>
<text x="1062" y="514" class="dim sm">planner skills automatically</text>

<rect x="1040" y="540" width="520" height="84" rx="14" class="panel"/>
<text x="1062" y="570" class="t lbl h">Compression</text>
<text x="1480" y="570" text-anchor="end" class="mute sm">optional</text>
<text x="1062" y="594" class="dim sm">per-layer · stakes-aware · lossless-first</text>
<text x="1062" y="614" class="dim sm">OFF until baseline numbers exist</text>

<text x="1040" y="654" class="mute tiny">profiles.json toggles the whole system: default · orchestration · openrouter_only</text>

<!-- ============================================================ -->
<!-- BOTTOM — GATES LEGEND -->
<!-- ============================================================ -->
<rect x="40" y="700" width="520" height="372" rx="14" class="panel"/>
<text x="62" y="734" class="t lbl h">Decision Gates</text>
<text x="62" y="752" class="mute tiny">escalate on signal of quality — never on cost alone</text>

<g class="sm">
  <circle cx="66" cy="780" r="5" fill="#22D3EE"/><text x="82" y="784" class="t h">A</text><text x="104" y="784" class="dim">context sufficiency — ask the human</text>
  <circle cx="66" cy="812" r="5" fill="#22D3EE"/><text x="82" y="816" class="t h">B</text><text x="104" y="816" class="dim">complexity → tier (score 0–10)</text>
  <circle cx="66" cy="844" r="5" fill="#F5B544"/><text x="82" y="848" class="t h">C</text><text x="104" y="848" class="dim">output confidence (self-flagged doubt)</text>
  <circle cx="66" cy="876" r="5" fill="#F5B544"/><text x="82" y="880" class="t h">D</text><text x="104" y="880" class="dim">error detection (lint / type / tests)</text>
  <circle cx="66" cy="908" r="5" fill="#F5B544"/><text x="82" y="912" class="t h">E</text><text x="104" y="912" class="dim">retry budget (2, then escalate)</text>
  <circle cx="66" cy="940" r="5" fill="#F5B544"/><text x="82" y="944" class="t h">F</text><text x="104" y="944" class="dim">output sanity (catch looping / give-up)</text>
  <circle cx="66" cy="972" r="5" fill="#FB7185"/><text x="82" y="976" class="t h">G</text><text x="104" y="976" class="dim">collaborative debug (only when stuck)</text>
  <circle cx="66" cy="1004" r="5" fill="#60A5FA"/><text x="82" y="1008" class="t h">H</text><text x="104" y="1008" class="dim">human-in-the-loop (high-stakes)</text>
</g>
<text x="62" y="1044" class="mute tiny">fallback chains bounce between independent providers — one outage never stalls a tier</text>

<!-- bottom-right: roadmap chips -->
<rect x="1040" y="700" width="520" height="372" rx="14" class="panel"/>
<text x="1062" y="734" class="t lbl h">Build Roadmap</text>
<g class="sm">
  <rect x="1062" y="752" width="476" height="34" rx="8" fill="#22D3EE" fill-opacity="0.10" stroke="#22D3EE" stroke-opacity="0.4"/><text x="1078" y="773" class="t">1 · Foundation &amp; Planner</text><text x="1522" y="773" text-anchor="end" class="dim tiny">in progress</text>
  <rect x="1062" y="792" width="476" height="34" rx="8" fill="#F5B544" fill-opacity="0.08" stroke="#F5B544" stroke-opacity="0.35"/><text x="1078" y="813" class="t">2 · Benchmark Baseline</text><text x="1522" y="813" text-anchor="end" class="mute tiny">queued</text>
  <rect x="1062" y="832" width="476" height="34" rx="8" fill="#A78BFA" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.35"/><text x="1078" y="853" class="t">3 · Gates &amp; Micro-Orchestrator</text><text x="1522" y="853" text-anchor="end" class="mute tiny">queued</text>
  <rect x="1062" y="872" width="476" height="34" rx="8" fill="#34D399" fill-opacity="0.08" stroke="#34D399" stroke-opacity="0.35"/><text x="1078" y="893" class="t">4 · Architect Self-Tuning</text><text x="1522" y="893" text-anchor="end" class="mute tiny">queued</text>
  <rect x="1062" y="912" width="476" height="34" rx="8" fill="#FB7185" fill-opacity="0.08" stroke="#FB7185" stroke-opacity="0.35"/><text x="1078" y="933" class="t">5 · Compression A/B</text><text x="1522" y="933" text-anchor="end" class="mute tiny">optional</text>
  <rect x="1062" y="952" width="476" height="34" rx="8" fill="#60A5FA" fill-opacity="0.08" stroke="#60A5FA" stroke-opacity="0.35"/><text x="1078" y="973" class="t">6 · Controlplane Dashboard · syndrax.app</text><text x="1522" y="973" text-anchor="end" class="mute tiny">queued</text>
  <rect x="1062" y="992" width="476" height="34" rx="8" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.2" stroke-dasharray="4 4"/><text x="1078" y="1013" class="t">✦ Self-Teaching Planner Loop</text><text x="1522" y="1013" text-anchor="end" class="mute tiny">planned</text>
</g>
<text x="1062" y="1044" class="mute tiny">stack: Namecheap · Cloudflare · Vercel · Railway · AWS Secrets</text>

</svg>
