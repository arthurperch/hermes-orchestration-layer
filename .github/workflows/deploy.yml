name: build-test-deploy

# Build -> Test -> Push. Tests must pass before any deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r mcp-requirements.txt
      - name: Run MCP smoke tests
        run: python mcp-test.py        # blocks deploy if this fails

  docker:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t syndrax-mcp:${{ github.sha }} .
      # --- DEPLOY: pick ONE of the options below and add the secret ---
      # Railway (recommended — flat-rate, no surprise autoscale bills):
      - name: Deploy to Railway
        run: |
          npm i -g @railway/cli
          railway up --service syndrax-mcp
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 9ef27d68-6785-4ba3-b50d-5c8abd23bbc4
          RAILWAY_SERVICE_ID: 0fd5ee41-98bc-490d-bc06-8b4d5ac7d66f
